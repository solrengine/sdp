name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: [ "3.2", "3.3", "3.4" ]
    steps:
      - uses: actions/checkout@v4
      # Sibling checkouts for the Gemfile path sources.
      # IN-FLIGHT v0.2: this engine needs solana-sdp ~> 0.2, which lives on the
      # client's feat/sdp-v0.2 branch (PR #1, intentionally unmerged until the
      # joint v0.2 release). Pin the clone to that branch. REVERT to the default
      # branch when solana-sdp 0.2 lands on main (Workstream F).
      - name: Checkout solana-sdp
        run: git clone --depth 1 --branch feat/sdp-v0.2 https://github.com/solrengine/solana-sdp.git ../solana-sdp
      - name: Checkout solrengine-realtime
        run: git clone --depth 1 https://github.com/solrengine/realtime.git ../solrengine-realtime
      - name: Checkout solrengine-rpc
        run: git clone --depth 1 https://github.com/solrengine/rpc.git ../solrengine-rpc
      - name: Checkout solrengine-tokens
        run: git clone --depth 1 https://github.com/solrengine/tokens.git ../solrengine-tokens
      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test

  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout solana-sdp
        run: git clone --depth 1 --branch feat/sdp-v0.2 https://github.com/solrengine/solana-sdp.git ../solana-sdp
      - name: Checkout solrengine-realtime
        run: git clone --depth 1 https://github.com/solrengine/realtime.git ../solrengine-realtime
      - name: Checkout solrengine-rpc
        run: git clone --depth 1 https://github.com/solrengine/rpc.git ../solrengine-rpc
      - name: Checkout solrengine-tokens
        run: git clone --depth 1 https://github.com/solrengine/tokens.git ../solrengine-tokens
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: RuboCop
        run: bundle exec rubocop
